<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>trace</title>

<style>
  body {
    margin: 0;
    background: black;
    color: #eaeaea;
    font-family: monospace;
    overflow: hidden;
  }

  /* text container */
  .content {
    position: relative;
    z-index: 2;
    max-width: 700px;
    margin: 10vh auto;
    padding: 20px;
    line-height: 1.6;
  }

  /* faint hacker rain canvas */
  canvas {
    position: fixed;
    top: 0;
    left: 0;
    z-index: 1;
    opacity: 0.15;
  }
</style>
</head>

<body>

<canvas id="matrix"></canvas>

<div class="content">
  <p>You reached the place where I built things.</p>

  <p>But I didn’t build an answer for everything.</p>

  <p>Some things don’t have a “when”.<br>
  Only a “maybe”.</p>

  <br>

  <p>If we meet again, it won’t be scheduled.<br>
  It will be recognized.</p>

  <br>

  <p style="opacity:0.4; margin-top:40px;">
    Follow the oldest trace I left here.
  </p>
</div>

<script>
const canvas = document.getElementById("matrix");
const ctx = canvas.getContext("2d");

canvas.height = window.innerHeight;
canvas.width = window.innerWidth;

const letters = "01ABCDEFGHIJKLMNOPQRSTUVWXYZ#$%&*+-/";
const fontSize = 14;
const columns = canvas.width / fontSize;

const drops = Array(Math.floor(columns)).fill(1);

function draw() {
  ctx.fillStyle = "rgba(0, 0, 0, 0.08)";
  ctx.fillRect(0, 0, canvas.width, canvas.height);

  ctx.fillStyle = "#00ff9d";
  ctx.font = fontSize + "px monospace";

  for (let i = 0; i < drops.length; i++) {
    const text = letters[Math.floor(Math.random() * letters.length)];
    ctx.fillText(text, i * fontSize, drops[i] * fontSize);

    if (drops[i] * fontSize > canvas.height && Math.random() > 0.975) {
      drops[i] = 0;
    }

    drops[i]++;
  }
}

setInterval(draw, 33);

window.addEventListener("resize", () => {
  canvas.height = window.innerHeight;
  canvas.width = window.innerWidth;
});
</script>

</body>
</html>
